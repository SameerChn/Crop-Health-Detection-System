services:
  # ─────────────────────────────────────────
  # Backend – Node.js / Express API
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crop-health-backend
    restart: unless-stopped
    ports:
      - "5000:5000"           # Expose for direct access / local dev
    env_file:
      - .env                  # Load all secrets from the root .env file
    environment:
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - crop-health-net

  # ─────────────────────────────────────────
  # Frontend – React/Vite built & served by Nginx
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The browser talks to Nginx which proxies /api/* → backend.
        # When running via docker compose on the same machine, use localhost.
        VITE_API_URL: ""      # Empty = relative URLs (/api/...) via Nginx proxy
    container_name: crop-health-frontend
    restart: unless-stopped
    ports:
      - "80:80"               # Access the app at http://localhost
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crop-health-net

networks:
  crop-health-net:
    driver: bridge
